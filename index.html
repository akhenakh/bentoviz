<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Stream Visual Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@comfyorg/litegraph@0.17.2/dist/css/litegraph.css">
    <link rel="stylesheet" href="styles.css">

    <!-- ACE Editor Scripts (Reusing Playground tooling) -->
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.15.0/src-min-noconflict/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.15.0/src-min-noconflict/mode-json.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.15.0/src-min-noconflict/mode-coffee.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.15.0/src-min-noconflict/theme-tomorrow_night_eighties.js"></script>
</head>
<body>
    <div id="app">
        <!-- ... (existing sidebar and main editor code) ... -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>BentoViz</h1>
                <p class="subtitle">Stream Visual Editor</p>
            </div>
            <!-- ... (Keep existing sidebar-sections inside) ... -->
            
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Stream</h3>
                </div>
                <div class="section-content">
                    <div class="form-group">
                        <label for="streamId">Stream ID</label>
                        <input type="text" id="streamId" value="test_stream" placeholder="my_stream">
                    </div>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Actions</h3>
                </div>
                <div class="section-content actions">
                    <button id="btnPreview" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        Preview Config
                    </button>
                    <button id="btnShowConfig" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Show Config
                    </button>
                    <button id="btnDeploy" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2l-7 20-4-9-9-4 20-7z"></path>
                        </svg>
                        Deploy Stream
                    </button>
                    <button id="btnStop" class="btn btn-danger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        </svg>
                        Stop Stream
                    </button>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Streams</h3>
                    <button id="btnRefresh" class="btn-icon" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
                <div class="section-content">
                    <div id="streamsList" class="streams-list">
                        <p class="empty-state">No streams found</p>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Graph</h3>
                </div>
                <div class="section-content actions">
                    <button id="btnSave" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save
                    </button>
                    <button id="btnLoad" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Load
                    </button>
                    <button id="btnClear" class="btn btn-danger-outline">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear
                    </button>
                </div>
            </div>
            
            <div class="sidebar-section node-palette">
                <div class="section-header">
                    <h3>Nodes</h3>
                    <input type="text" id="nodeSearch" placeholder="Search nodes..." class="search-input">
                </div>
                <div class="section-content">
                    <div id="nodePalette" class="node-palette-list"></div>
                </div>
            </div>
        </aside>

        <main id="editor">
            <div id="canvas-container">
                <canvas id="graph-canvas"></canvas>
            </div>
        </main>
        
        <aside id="config-panel" class="collapsed">
            <!-- ... (Keep existing config-panel intact) ... -->
            <div class="panel-header">
                <h3>Configuration Preview</h3>
                <div class="panel-header-actions">
                    <button id="btnCopy" class="btn-icon" title="Copy to clipboard">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <button id="btnHideConfig" class="btn-icon" title="Hide panel">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="panel-content">
                <pre id="config-preview"><code>// Compile the graph to see the Bento config</code></pre>
            </div>
        </aside>
    </div>
    
    <div class="toast-container" id="toast-container"></div>
    
    <!-- Standard Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button id="btnCloseModal" class="btn-close">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- Advanced Playground Modal -->
    <div id="advanced-editor-modal" class="modal">
        <div class="modal-content large-modal">
            <div class="modal-header">
                <h3 id="advanced-editor-title">Edit Mapping</h3>
                <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
                    <button id="btnSaveMapping" class="btn btn-primary">Save & Close</button>
                    <button id="btnCloseAdvancedEditor" class="btn-close">&times;</button>
                </div>
            </div>
            <div class="advanced-editor-body">
                <div class="editor-pane">
                    <div class="pane-header">Test Input (JSON)</div>
                    <div id="ace-input" class="ace-container"></div>
                </div>
                <div class="editor-pane">
                    <div class="pane-header">Mapping (Bloblang)</div>
                    <div id="ace-mapping" class="ace-container"></div>
                </div>
                <div class="editor-pane full-width">
                    <div class="pane-header">Live Output / Errors</div>
                    <div id="ace-output" class="output-container"></div>
                </div>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept=".json" style="display:none">
    
    <script type="module" src="app.js"></script>
</body>
</html>
